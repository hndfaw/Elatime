name: Autonomous Loop

# Elatime's self-driving cycle. Every ~45 minutes it:
#   1. checks out the current repo state,
#   2. runs the routine scrape and refreshes data/events.json,
#   3. commits the refreshed data back to main (only when it changed),
#   4. (optionally) invokes the Claude Code agent to implement the highest
#      priority open issue — dormant until a model credential is provided.
#
# NOTE ON CADENCE: standard cron cannot express a true fixed 45-minute period.
# "*/45 * * * *" fires at :00 and :45 each hour. GitHub also schedules cron on a
# best-effort basis and may delay runs under load. Both are acceptable here —
# the loop is idempotent and the scrape is offline-safe.

on:
  schedule:
    - cron: "*/45 * * * *"
  workflow_dispatch:
    inputs:
      live:
        description: "Attempt live HTTP scraping (falls back to fixtures)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: autonomous-loop
  cancel-in-progress: false

jobs:
  scrape:
    name: Routine scrape + commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate suite is green before committing data
        run: npm run typecheck && npm test

      - name: Run routine scrape
        run: |
          if [ "${{ inputs.live }}" = "true" ]; then
            npm run scrape -- --live
          else
            npm run scrape
          fi

      - name: Commit refreshed events data
        run: |
          git config user.name "elatime-bot"
          git config user.email "elatime-bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/events.json)" ]; then
            git add data/events.json
            git commit -m "chore(data): routine scrape refresh [skip ci]"
            git push
            echo "Committed refreshed events.json"
          else
            echo "No event changes this cycle"
          fi

  autonomous-agent:
    name: Implement top-priority issue (dormant until credential added)
    needs: scrape
    runs-on: ubuntu-latest
    # Stays dormant until BOTH a repo variable and a model credential exist.
    # Enable with: gh variable set ENABLE_AUTONOMOUS_AGENT --body true
    #   and:       gh secret set CLAUDE_CODE_OAUTH_TOKEN --body <token>
    if: ${{ vars.ENABLE_AUTONOMOUS_AGENT == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Claude Code — implement highest-priority open issue
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are Elatime's autonomous maintainer. Read README.md and docs/ARCHITECTURE.md
            for the spec. Then:
              1. List open issues labeled "elatime-backlog" ordered by the "priority/*" label.
              2. Pick the single highest-priority open issue.
              3. Implement it end to end: code + exhaustive tests + docs.
              4. Run `npm run typecheck && npm test && npm run build`. Only proceed if fully green.
              5. Commit on a branch, open a PR, and if the suite is green, squash-merge it,
                 delete the branch, and close the issue with a one-paragraph summary.
            Never merge a red or partial suite. If a genuine product decision is required,
            comment on the issue and stop instead of guessing.
